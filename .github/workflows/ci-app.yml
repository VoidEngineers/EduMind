name: CI Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches:
      [main, develop, devops/implementing-the-ci-pipeline-for-models-deployment]

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      validation_result: ${{ steps.validation_status.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install black isort flake8 pytest safety bandit

      - name: Code formatting (Black)
        id: black_check
        run: black --check . || echo "::warning::Black formatting issues found - run 'black .' to fix"
        continue-on-error: true

      - name: Import sorting (isort)
        id: isort_check
        run: isort --check-only --profile black . || echo "::warning::isort issues found - run 'isort .' to fix"
        continue-on-error: true

      - name: Linting (Flake8)
        id: flake8_check
        run: flake8 --max-line-length=88 --extend-ignore=E203,W503 . || echo "::warning::Flake8 issues found"
        continue-on-error: true

      - name: Unit tests (pytest)
        id: pytest_check
        run: pytest || echo "::warning::Some tests failed or no tests found"
        continue-on-error: true

      - name: Security scan (Safety)
        id: safety_check
        run: safety check || echo "::warning::Dependency vulnerabilities found"
        continue-on-error: true

      - name: Security scan (Bandit)
        id: bandit_check
        run: bandit -r . -ll || echo "::warning::Security issues found"
        continue-on-error: true

      - name: Check for failures
        id: validation_status
        run: |
          failed=0
          if [ "${{ steps.black_check.outcome }}" = "failure" ]; then failed=1; fi
          if [ "${{ steps.isort_check.outcome }}" = "failure" ]; then failed=1; fi
          if [ "${{ steps.flake8_check.outcome }}" = "failure" ]; then failed=1; fi
          if [ "${{ steps.pytest_check.outcome }}" = "failure" ]; then failed=1; fi
          if [ "${{ steps.safety_check.outcome }}" = "failure" ]; then failed=1; fi
          if [ "${{ steps.bandit_check.outcome }}" = "failure" ]; then failed=1; fi

          if [ $failed -eq 1 ]; then
            echo "Validation failed - one or more checks failed"
            exit 1
          else
            echo "All validation checks passed"
          fi

  logging:
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Send execution start separator to Loki
        uses: skroutz/action-send-logs-to-loki@v0.0.3
        with:
          loki_endpoint: "https://${{ secrets.GRAFANA_LOKI_USER_CLOUD }}:${{ secrets.GRAFANA_LOKI_TKN_CLOUD }}@logs-prod-028.grafana.net"
          github_token: ${{ secrets.PERSONAL_GITHUB_TOKEN_VIKUM }}
          labels: "service_name=edumind-ci-validation,repo=EduMind,project=last-year-research,status=separator,workflow=${{ github.workflow }},run_id=${{ github.run_id }},commit_sha=${{ github.sha }},actor=${{ github.actor }},branch=${{ github.ref_name }}"
          message_to_loki: "\n\n笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊申nNEW EXECUTION STARTED\n笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊申nRun ID: ${{ github.run_id }}\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}\nBranch: ${{ github.ref_name }}\nTimestamp: ${{ github.event.head_commit.timestamp }}\n笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊絶武笊申n\n"

      - name: Send detailed failure logs to Loki
        if: needs.validate.result == 'failure'
        uses: skroutz/action-send-logs-to-loki@v0.0.3
        with:
          loki_endpoint: "https://${{ secrets.GRAFANA_LOKI_USER_CLOUD }}:${{ secrets.GRAFANA_LOKI_TKN_CLOUD }}@logs-prod-028.grafana.net"
          github_token: ${{ secrets.PERSONAL_GITHUB_TOKEN_VIKUM }}
          labels: "service_name=edumind-ci-validation,repo=EduMind,project=last-year-research,status=failure,workflow=${{ github.workflow }},run_id=${{ github.run_id }},commit_sha=${{ github.sha }},actor=${{ github.actor }},branch=${{ github.ref_name }}"

      - name: Send success message to Loki
        if: needs.validate.result == 'success'
        uses: skroutz/action-send-logs-to-loki@v0.0.3
        with:
          loki_endpoint: "https://${{ secrets.GRAFANA_LOKI_USER_CLOUD }}:${{ secrets.GRAFANA_LOKI_TKN_CLOUD }}@logs-prod-028.grafana.net"
          github_token: ${{ secrets.PERSONAL_GITHUB_TOKEN_VIKUM }}
          labels: "service_name=edumind-ci-validation,repo=EduMind,project=last-year-research,status=success,workflow=${{ github.workflow }},run_id=${{ github.run_id }},commit_sha=${{ github.sha }},actor=${{ github.actor }},branch=${{ github.ref_name }}"
          message_to_loki: "CI Validation completed successfully | Commit: ${{ github.sha }} | Actor: ${{ github.actor }} | Branch: ${{ github.ref_name }}"
