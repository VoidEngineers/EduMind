name: AI Failure Analyzer - Deployment Pipeline

on:
  push:
    branches:
      [main, develop, devops/implementing-the-ci-pipeline-for-models-deployment]
    paths:
      - "deployments/poc-ci-pipeline-webhook-service/**"
      - ".github/workflows/deployment-pipeline-for-alert-webhook.yml"
  pull_request:
    branches: [main]
    paths:
      - "deployments/poc-ci-pipeline-webhook-service/**"

permissions:
  id-token: write
  contents: read

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    outputs:
      integration_result: ${{ steps.final_status.outcome }}
    defaults:
      run:
        working-directory: deployments/poc-ci-pipeline-webhook-service
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-cov

      - name: Lint code with flake8
        id: lint
        continue-on-error: true
        run: |
          echo "Running flake8 linting..."
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Format code with black
        id: format_check
        run: |
          echo "Formatting code with black..."
          black app/
          echo "Code formatted successfully"

      - name: Run unit tests
        id: tests
        continue-on-error: true
        run: |
          echo "Running unit tests..."
          # Validate imports without triggering config validation
          python -c "from app import models, error_parser, llm_service, patch_service, github_service"
          echo "All imports successful"

      - name: Validate configuration
        id: config_validation
        continue-on-error: true
        env:
          OPENAI_API_KEY: test_key_for_validation
          GITHUB_TOKEN: test_token_for_validation
          GITHUB_ORG: test_org
        run: |
          echo "Validating configuration structure..."
          python -c "from app.config import Config; print('Config validation passed')"

      - name: Check integration status
        id: final_status
        run: |
          if [ "${{ steps.lint.outcome }}" = "failure" ] || \
             [ "${{ steps.format_check.outcome }}" = "failure" ] || \
             [ "${{ steps.tests.outcome }}" = "failure" ] || \
             [ "${{ steps.config_validation.outcome }}" = "failure" ]; then
            echo "Integration checks failed"
            exit 1
          else
            echo "Integration checks passed"
          fi

  build-and-push-ecr-image:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest
    outputs:
      build_result: ${{ steps.build_status.outcome }}
      image_uri: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_VIKUM }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_VIKUM }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        working-directory: deployments/poc-ci-pipeline-webhook-service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          # Build a docker container using the Dockerfile
          # and push it to ECR so that it can be deployed
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Set build status
        id: build_status
        if: always()
        run: |
          if [ "${{ steps.build-image.outcome }}" = "success" ]; then
            echo "Build successful"
            exit 0
          else
            echo "Build failed"
            exit 1
          fi

  continuous-deployment:
    name: Continuous Deployment
    needs: build-and-push-ecr-image
    runs-on: ubuntu-latest
    outputs:
      deployment_result: ${{ steps.deployment_status.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to AWS Lightsail
        id: run_container
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST_VIKUM }}
          username: ${{ secrets.LIGHTSAIL_USER_UBUNTU }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY_VIKUM }}
          port: 22
          script: |
            # Install AWS CLI if not present
            if ! command -v aws &> /dev/null; then
              echo "AWS CLI not found. Installing..."
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -q awscliv2.zip
              sudo ./aws/install
              rm -rf aws awscliv2.zip
              echo "AWS CLI installed successfully"
            fi

            # Configure AWS credentials on Lightsail instance
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID_VIKUM }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY_VIKUM }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_LOGIN_URI_VIKUM }}

            # Pull the latest image
            docker pull ${{ secrets.AWS_ECR_LOGIN_URI_VIKUM }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest

            # Stop and remove existing container if running
            docker ps -q --filter "name=ai-failure-analyzer" | grep -q . && docker stop ai-failure-analyzer && docker rm -fv ai-failure-analyzer || true

            # Run the new container
            docker run -d -p 8000:8000 --name=ai-failure-analyzer \
              --restart unless-stopped \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              -e GITHUB_TOKEN=${{ secrets.PERSONAL_GITHUB_TOKEN_VIKUM_CLASSIC }} \
              -e GITHUB_ORG=${{ secrets.ORG_IN_GITHUB }} \
              -e OPENAI_MODEL=gpt-4 \
              -e OPENAI_TEMPERATURE=0.2 \
              -e LOG_LEVEL=INFO \
              -e SERVICE_PORT=8000 \
              -e MAX_FILES_TO_MODIFY=3 \
              -v /tmp/repos:/tmp/repos \
              ${{ secrets.AWS_ECR_LOGIN_URI_VIKUM }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest

            # Wait for container to start
            sleep 5

            # Check container health
            if docker ps | grep -q ai-failure-analyzer; then
              echo "Container started successfully"
              
              # Test health endpoint
              for i in {1..10}; do
                if curl -f http://localhost:8000/health > /dev/null 2>&1; then
                  echo "Service is healthy!"
                  break
                fi
                echo "Waiting for service to be ready... ($i/10)"
                sleep 3
              done
            else
              echo "Container failed to start"
              exit 1
            fi

            # Clean up unused images and containers
            docker system prune -f

      - name: Set deployment status
        id: deployment_status
        if: always()
        run: |
          if [ "${{ steps.run_container.outcome }}" = "success" ]; then
            echo "Deployment successful to Lightsail instance"
            exit 0
          else
            echo "Deployment to Lightsail failed"
            exit 1
          fi

  logging:
    runs-on: ubuntu-latest
    needs: [integration, build-and-push-ecr-image, continuous-deployment]
    if: always()
    steps:
      - name: Send execution start separator to Loki
        uses: skroutz/action-send-logs-to-loki@v0.0.3
        with:
          loki_endpoint: "https://${{ secrets.GRAFANA_LOKI_USER_CLOUD }}:${{ secrets.GRAFANA_LOKI_TKN_CLOUD }}@logs-prod-028.grafana.net"
          github_token: ${{ secrets.PERSONAL_GITHUB_TOKEN_VIKUM_FOR_LOGS }}
          labels: "service_name=ai-failure-analyzer,repo=MLOps-Bootcamp,project=webhook-service,status=separator,workflow=${{ github.workflow }},run_id=${{ github.run_id }},commit_sha=${{ github.sha }},actor=${{ github.actor }},branch=${{ github.ref_name }}"
          message_to_loki: "\n\n═══════════════════════════════════════════════════════════════\nNEW EXECUTION STARTED - AI FAILURE ANALYZER\n═══════════════════════════════════════════════════════════════\nRun ID: ${{ github.run_id }}\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}\nBranch: ${{ github.ref_name }}\nTimestamp: ${{ github.event.head_commit.timestamp }}\n═══════════════════════════════════════════════════════════════\n\n"

      - name: Send detailed failure logs to Loki
        if: |
          needs.integration.result == 'failure' ||
          needs.build-and-push-ecr-image.result == 'failure' ||
          needs.continuous-deployment.result == 'failure'
        uses: skroutz/action-send-logs-to-loki@v0.0.3
        with:
          loki_endpoint: "https://${{ secrets.GRAFANA_LOKI_USER_CLOUD }}:${{ secrets.GRAFANA_LOKI_TKN_CLOUD }}@logs-prod-028.grafana.net"
          github_token: ${{ secrets.PERSONAL_GITHUB_TOKEN_VIKUM_FOR_LOGS }}
          labels: "service_name=ai-failure-analyzer,repo=MLOps-Bootcamp,project=webhook-service,status=failure,workflow=${{ github.workflow }},run_id=${{ github.run_id }},commit_sha=${{ github.sha }},actor=${{ github.actor }},branch=${{ github.ref_name }},integration=${{ needs.integration.result }},build=${{ needs.build-and-push-ecr-image.result }},deployment=${{ needs.continuous-deployment.result }}"

      - name: Send success message to Loki
        if: |
          needs.integration.result == 'success' &&
          needs.build-and-push-ecr-image.result == 'success' &&
          needs.continuous-deployment.result == 'success'
        uses: skroutz/action-send-logs-to-loki@v0.0.3
        with:
          loki_endpoint: "https://${{ secrets.GRAFANA_LOKI_USER_CLOUD }}:${{ secrets.GRAFANA_LOKI_TKN_CLOUD }}@logs-prod-028.grafana.net"
          github_token: ${{ secrets.PERSONAL_GITHUB_TOKEN_VIKUM_FOR_LOGS }}
          labels: "service_name=ai-failure-analyzer,repo=MLOps-Bootcamp,project=webhook-service,status=success,workflow=${{ github.workflow }},run_id=${{ github.run_id }},commit_sha=${{ github.sha }},actor=${{ github.actor }},branch=${{ github.ref_name }}"
          message_to_loki: "AI Failure Analyzer deployment completed successfully | Service: http://${{ secrets.LIGHTSAIL_HOST_VIKUM }}:8000 | Commit: ${{ github.sha }} | Actor: ${{ github.actor }} | Branch: ${{ github.ref_name }}"

