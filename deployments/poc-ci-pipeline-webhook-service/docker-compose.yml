version: "3.8"

services:
  ai-failure-analyzer:
    build: .
    container_name: ai-failure-analyzer
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.2}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - CLONE_DIRECTORY=/tmp/repos
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_PORT=8000
      - MAX_FILES_TO_MODIFY=${MAX_FILES_TO_MODIFY:-3}
    volumes:
      - repo-clones:/tmp/repos
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  repo-clones:
    driver: local
